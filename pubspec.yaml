name: famcare_app
description: "AI Powered Family Health Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ✅ DATABASE & AUTH
  supabase_flutter: ^2.5.6
  flutter_dotenv: ^5.1.0

  # 🔔 ALARMS & NOTIFICATIONS
  alarm: ^5.2.1
  flutter_fgbg: ^0.7.1
  flutter_local_notifications: ^17.1.2
  permission_handler: ^12.0.1
  timezone: ^0.9.4
  # android_alarm_manager_plus: ^5.0.0 (Removed to avoid conflict with 'alarm' package)

  # 📸 CAMERA & IMAGE
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # 🤖 AI & OCR (NEW)
  google_mlkit_text_recognition: ^0.13.0
  http: ^1.2.2
  intl: ^0.19.0

  # 🎨 UI & FONTS
  google_fonts: ^6.3.3
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  device_info_plus: ^13.1.0
  app_settings: ^7.0.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  flutter_riverpod: ^2.5.1
  workmanager: ^0.9.0
  lucide_icons_flutter: ^3.1.14+2
  isar: ^3.1.0+1
  flutter_animate: ^4.5.2
  share_plus: ^13.1.0
  pdf: ^3.12.0
  connectivity_plus: ^7.1.1
  table_calendar: ^3.1.3

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.mp3
    - .env
name: famcare_app
description: "Family Health Tracker App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ✅ SUPABASE (DATABASE)
  supabase_flutter: ^2.5.6

  # 🎨 UI & ICONS (FAMCARE UI)
  lucide_icons: 0.257.0     # 👈 YE MISSING THA!
  google_fonts: ^6.1.0

  # 🔔 AUDIO & ALARM SYSTEM
  audioplayers: ^6.0.0
  flutter_local_notifications: ^17.0.0
  android_alarm_manager_plus: ^5.0.0
  timezone: ^0.9.2

  # 📸 IMAGE & UTILS
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/alarm.mp3
    - .env